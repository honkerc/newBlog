name: Build Mini APK

on:
  push:
    branches: [ master ]
    paths:
      - 'mini/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: mini
        run: npm install

      - name: Build Vue app
        working-directory: mini
        run: npm run build

      - name: Copy web assets to Android
        working-directory: mini
        run: npx cap copy android

      - name: Build APK
        working-directory: mini/android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mini-app-debug
          path: mini/android/app/build/outputs/apk/debug/app-debug.apk
