name: Build Mini APK

on:
  push:
    branches: [ main ]
    paths:
      - 'mini/**'
  workflow_dispatch:  # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mini

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          cd ..
          npm install

      - name: Build Vue app
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync

      - name: Build APK
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mini-app-debug
          path: mini/android/app/build/outputs/apk/debug/app-debug.apk
