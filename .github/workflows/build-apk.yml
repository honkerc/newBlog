name: Build Mini APK

on:
  push:
    branches: [ main ]
    paths:
      - 'mini/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: mini
        run: |
          cd ..
          npm install

      - name: Build Vue app
        working-directory: mini
        run: npm run build

      - name: Sync Capacitor
        working-directory: mini
        run: npx cap sync

      - name: Ensure Android network config
        run: |
          # 创建 network_security_config.xml
          mkdir -p ${{ github.workspace }}/mini/android/app/src/main/res/xml
          cat > ${{ github.workspace }}/mini/android/app/src/main/res/xml/network_security_config.xml << 'XMLEOF'
<?xml version="1.0" encoding="utf-8"?>
<network-security-config>
    <base-config cleartextTrafficPermitted="true">
        <trust-anchors>
            <certificates src="system" />
        </trust-anchors>
    </base-config>
</network-security-config>
XMLEOF

          # 确保 AndroidManifest.xml 有 networkSecurityConfig
          MANIFEST=${{ github.workspace }}/mini/android/app/src/main/AndroidManifest.xml
          if ! grep -q "networkSecurityConfig" "$MANIFEST"; then
            sed -i 's|android:usesCleartextTraffic="true"|android:usesCleartextTraffic="true"\n        android:networkSecurityConfig="@xml/network_security_config"|' "$MANIFEST"
          fi

      - name: Build APK
        run: |
          chmod +x ${{ github.workspace }}/mini/android/gradlew
          cd ${{ github.workspace }}/mini/android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mini-app-debug
          path: mini/android/app/build/outputs/apk/debug/app-debug.apk
